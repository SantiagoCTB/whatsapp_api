events {}

http {
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Permitir cargas más grandes (p. ej. catálogos extensos)
    client_max_body_size 200M;

    # Endurecimiento TLS
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # Backend: tu app Python en el contenedor "web"
    upstream whapco_app {
        server web:8000;
    }

    # ============================
    #  Landing: whapco.site
    # ============================

    # HTTP -> responder challenge de Let's Encrypt y redirigir resto a HTTPS
    server {
        listen 80;
        server_name whapco.site;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS real
    server {
        listen 443 ssl;
        server_name whapco.site;

        ssl_certificate     /etc/letsencrypt/live/whapco.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/whapco.site/privkey.pem;

        root /usr/share/nginx/html/landing;
        index index.html;

        location / {
            # Permite URLs sin la extensión .html y devuelve index.html como fallback
            try_files $uri $uri/ $uri.html /index.html;
        }
    }

    # ============================
    #  App: app.whapco.site
    # ============================

    # HTTP -> responder challenge de Let's Encrypt y redirigir resto a HTTPS
    server {
        listen 80;
        server_name app.whapco.site;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS real
    server {
        listen 443 ssl;
        server_name app.whapco.site;

        ssl_certificate     /etc/letsencrypt/live/app.whapco.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/app.whapco.site/privkey.pem;

        location / {
            proxy_pass http://whapco_app;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
        }
    }
}
